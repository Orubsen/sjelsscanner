[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"

[[redirects]]
from = "/api/gemini"
to = "https://us-central1-kjernekoden.cloudfunctions.net/gemini-backend"
status = 200

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
