[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Deltakerdata (navn, alder, e-post) lagres i Netlify Blobs via save-participant.

[dev]
  # Local Netlify dev: allow Gemini proxy calls up to 60s (default can be ~10s)
  functionsTimeout = 60

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200